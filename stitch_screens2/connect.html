<div class="bg-surface-container-high/80 backdrop-blur-xl rounded-xl border border-outline-variant/15 neon-glow overflow-hidden flex flex-col watermark">
<!-- Header Section -->

<span class="material-symbols-outlined text-primary-dim text-sm">lock</span>
<span class="font-body text-[0.75rem] text-on-surface-variant font-medium">End-to-end encrypted connection verified</span>
</div>

<div class="space-y-3">
<!-- MetaMask Option -->
<button class="w-full bg-surface-container-highest/80 border border-outline-variant/15 rounded-lg p-4 flex items-center justify-between group wallet-card-hover transition-all duration-300">

<p class="font-body text-[0.75rem] text-on-surface-variant">Browser Extension</p>

</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors opacity-0 group-hover:opacity-100 -translate-x-2 group-hover:translate-x-0 transform duration-300">chevron_right</span>
</button>

<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-container-lowest flex items-center justify-center border border-outline-variant/20">
<span class="material-symbols-outlined text-secondary-dim text-xl" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
</div>
<div class="text-left">
<h3 class="font-body text-[1rem] font-semibold text-on-surface group-hover:text-primary transition-colors">WalletConnect</h3>
